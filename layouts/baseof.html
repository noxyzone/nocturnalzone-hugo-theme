<!doctype html>
<html lang="{{ or site.Language.Lang site.LanguageCode `en` }}" dir="ltr">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        {{ partial "header.html" . }}
      </header>
      <main class="site-main">
        {{ block "main" . }}{{ end }}
      </main>
      <footer class="site-footer">
        {{ partial "footer.html" . }}
      </footer>
    </div>
  </body>
</html>
